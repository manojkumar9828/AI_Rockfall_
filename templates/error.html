{% extends "base.html" %}
{% block title %}Error {{ code }} — RockGuard AI{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 text-center">
      <div class="card-rockfall mt-5">
        <i class="fas fa-exclamation-triangle text-warning" style="font-size:4rem;"></i>
        <h1 class="display-4 fw-bold text-warning mt-3">{{ code }}</h1>
        <p class="text-muted mb-4">{{ message }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-rockfall"><i class="fas fa-home"></i> Back to Home</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
